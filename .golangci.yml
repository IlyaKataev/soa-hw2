version: '2'

run:
  timeout: 5m
  tests: true
  concurrency: 8

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck

    - gocritic
    - misspell

    - gosec
    - bodyclose
    - sqlclosecheck

    - gocognit

  exclusions:
    paths:
      - internal/api/        # generated by oapi-codegen
      - internal/db/sqlc/    # generated by sqlc
    rules:
      - path: _test\.go
        linters:
          - gocognit
          - gosec
          - errcheck    # resp.Body.Close() error is unactionable in tests
          - bodyclose   # decodeJSON() closes the body internally

      # weak random is fine for non-security purposes
      - linters: [gosec]
        text: "G404"
      # http server without timeout is acceptable in this context
      - linters: [gosec]
        text: "G114"
      # directory/file permission checks
      - linters: [gosec]
        text: "G30[1246]"
      # db.Close() error is unactionable in error paths
      - linters: [gosec]
        text: "G104"
      # ErrInvalidCredentials is an error code string constant, not a credential
      - path: internal/apierr/errors\.go
        linters: [gosec]
        text: "G101"
      # int→int32 conversions are safe: quantity validated [1,999], page is small
      - path: internal/handler/
        linters: [gosec]
        text: "G115"
      # os.Exit in main is intentional; defer cancel() not running is fine on process exit
      - path: cmd/server/main\.go
        linters: [gocritic]
        text: "exitAfterDefer"

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.DB).Close
        - (github.com/jackc/pgx/v5.Tx).Rollback  # pgx tx rollback on error path is unactionable

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - commentFormatting
        - hugeParam
        - whyNoLint       # nolint comments don't need inline explanations
        - paramTypeCombine # minor style: merging same-type params is optional

    gocognit:
      min-complexity: 45  # Create/Update orders have inherent complexity per spec

    misspell: {}

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - marketplace
  exclusions:
    paths:
      - internal/api/
      - internal/db/sqlc/
